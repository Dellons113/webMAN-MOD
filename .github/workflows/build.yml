name: Build webMAN Custom Rebug

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual kapan saja
  push:
    paths:
      - 'flags.h'    # Otomatis melakukan build jika Anda mengedit flags.h lagi

jobs:
  compile:
    runs-on: ubuntu-latest
    container: ps3dev/ps3dev:latest # Menggunakan environment PS3 SDK resmi

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Proses Kompilasi (Make)
        run: |
          make clean
          make all

      - name: Upload Hasil Build (PKG & SPRX)
        uses: actions/upload-artifact@v4
        with:
          name: webMAN-Cobra81-Rebug-Optimized
          path: |
            *.pkg
            *.sprx
