name: Build webMAN Custom Rebug

on:
  workflow_dispatch:
  push:
    paths:
      - 'flags.h'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make git wget

      - name: Setup PS3DEV Toolchain
        run: |
          # Mengunduh toolchain yang sudah di-compile dari rilis terbaru ps3dev
          wget https://github.com/ps3dev/ps3toolchain/releases/latest/download/ps3dev-linux-x86_64.tar.gz
          tar -xf ps3dev-linux-x86_64.tar.gz -C /usr/local
          
          # Menambahkan ke PATH agar sistem mengenali compiler PS3
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

      - name: Build webMAN-MOD
        run: |
          make clean
          make all

      - name: Upload Hasil Build
        uses: actions/upload-artifact@v4
        with:
          name: webMAN-Cobra81-Rebug-Optimized
          path: |
            *.pkg
            *.sprx
